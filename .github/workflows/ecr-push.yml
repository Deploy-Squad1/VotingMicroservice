name: Build and Push Voting to ECR

on:
  push:
    branches:
      - main
      - chore/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  ECR_REPOSITORY: voting-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          REPO=$ECR_REGISTRY/$ECR_REPOSITORY
          
          echo "Building image with primary SHA tag: $IMAGE_TAG"
          docker build -t $REPO:$IMAGE_TAG .

      - name: Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          REPO=$ECR_REGISTRY/$ECR_REPOSITORY
          
          docker push $REPO:$IMAGE_TAG
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            SECONDARY_TAG="stage"
          elif [ "${{ github.ref_name }}" == "main" ]; then
            SECONDARY_TAG="latest"
          else
            SECONDARY_TAG=$(echo "${{ github.ref_name }}" | tr '/' '-')
          fi
          
          docker tag $REPO:$IMAGE_TAG $REPO:$SECONDARY_TAG
          docker push $REPO:$SECONDARY_TAG
